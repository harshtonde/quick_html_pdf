name: quick_html_pdf
description: A fast, high-performance Flutter Web package for converting HTML templates with dynamic data into vector PDFs using a custom measure-and-flow paginator + jsPDF.
version: 3.1.0
repository: https://github.com/harshtonde/quick_html_pdf.git
homepage: https://github.com/harshtonde/quick_html_pdf
issue_tracker: https://github.com/harshtonde/quick_html_pdf/issues

environment:
  sdk: ^3.8.1
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

platforms:
  web:

topics:
  - pdf
  - html
  - flutter-web
  - printing

flutter:
  assets:
    - assets/jspdf.umd.min.js
